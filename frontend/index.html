<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ToDoApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="app-wrapper">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-mark">
                <span class="logo-bracket">[</span>
                <span class="logo-icon">✓</span>
                <span class="logo-bracket">]</span>
            </div>
            <div class="header-titles">
                <h1 class="app-title">ToDoApp</h1>
                <p class="app-sub">com.subho.ToDoApp · Spring Boot API</p>
            </div>
        </div>
        <div class="api-status">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-label" id="statusLabel">Connecting…</span>
        </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-pill">
            <span class="stat-num" id="statTotal">0</span>
            <span class="stat-desc">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-pill">
            <span class="stat-num" id="statPending">0</span>
            <span class="stat-desc">Pending</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-pill">
            <span class="stat-num" id="statDone">0</span>
            <span class="stat-desc">Done</span>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">

        <!-- Left Panel: Add / Edit Form -->
        <aside class="form-panel">
            <div class="panel-header">
                <span class="panel-tag">POST /tasks</span>
                <h2 class="panel-title" id="formTitle">New Task</h2>
            </div>

            <div class="form-group">
                <label class="form-label" for="taskTitle">Task Name</label>
                <input class="form-input" id="taskTitle" type="text" placeholder="What needs to be done?" autocomplete="off"/>
            </div>

            <div style="display:none">
                <textarea id="taskDesc"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Status</label>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="togglePending" onclick="setStatus(false)">Pending</button>
                    <button class="toggle-btn" id="toggleDone" onclick="setStatus(true)">Completed</button>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn-primary" id="submitBtn" onclick="submitTask()">
                    <span class="btn-icon">+</span> Add Task
                </button>
                <button class="btn-ghost" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
            </div>

            <div class="endpoint-log" id="endpointLog">
                <p class="log-label">Last Request</p>
                <p class="log-entry" id="logEntry">—</p>
            </div>
        </aside>

        <!-- Right Panel: Task List -->
        <main class="list-panel">
            <div class="list-header">
                <div class="list-controls">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
                    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">Pending</button>
                    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Completed</button>
                </div>
                <button class="btn-refresh" onclick="loadTasks()" title="Refresh">
                    <span id="refreshIcon">↻</span>
                </button>
            </div>

            <div class="task-list" id="taskList">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">◎</div>
                    <p>No tasks yet. Add one!</p>
                </div>
            </div>
        </main>

    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

</div>

<script src="app.js"></script>
</body>
</html>
